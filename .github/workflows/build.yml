name: Build APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 解压项目ZIP只有温湿度
      run: |
        unzip -o WIFIApplication.zip
        # 自动处理嵌套文件夹
        if [ -f */gradlew ]; then
          SUBDIR=$(dirname */gradlew)
          echo "检测到嵌套文件夹: $SUBDIR，正在移动文件到根目录..."
          mv $SUBDIR/* ./
          rm -rf $SUBDIR
        fi

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'          # 改成 11

    - name: 赋予gradlew执行权限
      run: chmod +x gradlew

    - name: 编译Debug APK
      run: ./gradlew assembleDebug

    - name: 上传APK作为产物
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
