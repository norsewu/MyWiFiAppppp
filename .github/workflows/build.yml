name: Build APK from ZIP

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: 解压项目ZIP
      run: |
        # 如果ZIP文件名不是 project.zip，请改成你上传的实际文件名
        unzip -o WIFIApplication.zip
        # 如果解压后发现所有文件都在一个子文件夹里，就把它移动到根目录
        # 这里自动检测并处理：如果存在一个子文件夹，且该文件夹内有gradlew，则将其内容上移
        if [ -f */gradlew ]; then
          SUBDIR=$(dirname */gradlew)
          echo "检测到嵌套文件夹: $SUBDIR，正在移动文件到根目录..."
          mv $SUBDIR/* ./
          rm -rf $SUBDIR
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 赋予gradlew执行权限
      run: chmod +x gradlew

    - name: 编译Debug APK
      run: ./gradlew assembleDebug

    - name: 上传APK作为产物
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
