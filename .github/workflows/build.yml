name: Build APK from ZIP

on:
  push:
    branches: [ main ]

# 强制使用 Node 24 消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4   # 建议用稳定版v4

    - name: 解压项目ZIP
      run: |
        unzip -o WIFIApplication.zip
        # 自动处理嵌套文件夹，并包含隐藏文件
        if ls */gradlew 1> /dev/null 2>&1; then
          SUBDIR=$(dirname */gradlew)
          echo "检测到嵌套文件夹: $SUBDIR，正在移动文件到根目录..."
          shopt -s dotglob        # 启用匹配隐藏文件
          mv $SUBDIR/* ./
          shopt -u dotglob        # 关闭匹配隐藏文件 (良好习惯)
          rm -rf $SUBDIR
        fi

    - name: Set up JDK 11
      uses: actions/setup-java@v4 # 建议用稳定版v4
      with:
        distribution: 'temurin'
        java-version: '11'        # 运行环境改为 JDK 11

    - name: 赋予gradlew执行权限
      run: chmod +x gradlew

    - name: 编译Debug APK
      run: ./gradlew assembleDebug

    - name: 上传APK作为产物
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
